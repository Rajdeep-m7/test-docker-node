version: "3.9"

services:
  app:
    image: rajdeep7/docker-nodejs-app:latest
    container_name: node_app
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=testdb
      - DB_PORT=5432
    networks:
      - node_pg_network

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - node_pg_network

networks:
  node_pg_network:

volumes:
  pg_data: